server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every non-file route resolves to index.html so
    # Vue Router's history mode (createWebHistory) works on a hard
    # refresh/direct link to e.g. /refresh or /upc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted build assets (Vite hashes filenames) can be cached
    # aggressively; index.html itself must not be, so a redeploy is
    # picked up on next load instead of being stuck behind an old cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
