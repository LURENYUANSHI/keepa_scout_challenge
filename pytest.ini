[pytest]
asyncio_mode = auto
# Session-scoped loop: tests/conftest.py's test_engine (and the asyncpg pool
# it holds) is session-scoped, so every async fixture/test needs to run on
# the same event loop that engine was created on — otherwise asyncpg raises
# "cannot perform operation: another operation is in progress" the moment a
# per-function loop tries to reuse a connection opened under a different
# loop. Pairs with removing the deprecated manual `event_loop` fixture in
# conftest.py.
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
